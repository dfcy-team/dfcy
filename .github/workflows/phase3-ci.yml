name: Phase 3 CI and Data Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/phase3-**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase3-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DJANGO_SECRET_KEY: phase3-ci-placeholder-secret
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
  DB_ENGINE: django.db.backends.sqlite3
  REDIS_URL: redis://localhost:6379/15
  CELERY_BROKER_URL: redis://localhost:6379/15
  CELERY_RESULT_BACKEND: redis://localhost:6379/15

jobs:
  repository-guard:
    name: Repository safety and forbidden file guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan without printing suspected values
        run: python saas-collab-system/backend/scripts/ci_guard.py --root .

  backend:
    name: Phase 3 Django, data quality, and pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-collab-system/backend
    env:
      DB_NAME: /tmp/phase3-ci.sqlite3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: saas-collab-system/backend/requirements.txt
      - name: Install backend dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Django system and migration checks
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
          python manage.py sync_permissions --check
      - name: Phase 3 focused test suites
        run: |
          python -m pytest -q \
            tests/test_phase3_bi_metrics.py \
            tests/test_phase3_inventory_alerts.py \
            tests/test_phase3_replenishment.py \
            tests/test_phase3_product_lifecycle.py \
            tests/test_phase3_business_alerts.py \
            tests/test_phase3_config_center.py \
            tests/test_phase3_report_finance_exports.py \
            tests/test_phase3_data_quality.py
      - name: Phase 3 persisted data quality
        run: python manage.py check_phase3_data_quality
      - name: Full backend pytest suite
        run: python -m pytest -q

  frontend-build:
    name: Frontend build without dependency lifecycle scripts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-collab-system/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: saas-collab-system/frontend/package-lock.json
      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Build frontend
        run: npm run build

  docker-config:
    name: Docker Compose placeholder configuration
    runs-on: ubuntu-latest
    env:
      DB_NAME: phase3_ci_demo
      DB_USER: phase3_ci_demo
      DB_PASSWORD: phase3-ci-placeholder-password
      MYSQL_ROOT_PASSWORD: phase3-ci-placeholder-root-password
      DB_HOST: mysql
      DB_PORT: "3306"
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose without a project .env
        run: docker compose --env-file /dev/null -f saas-collab-system/docker-compose.yml config --quiet

  rpa-and-docs:
    name: RPA samples and Phase 3 documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate RPA JSON without executing RPA
        shell: bash
        run: |
          find saas-collab-system/rpa-agent/tasks/examples -name '*.json' -print0 |
            xargs -0 -r -n 1 python -m json.tool >/dev/null
      - name: Reject RPA runtime output
        shell: bash
        run: |
          test -z "$(find saas-collab-system/rpa-agent/logs saas-collab-system/rpa-agent/screenshots -type f ! -name '.gitkeep' -print -quit)"
      - name: Check Phase 3 documents and change logs
        shell: bash
        run: |
          test -f saas-collab-system/docs/05_test/phase3_acceptance_checklist.md
          test -f saas-collab-system/docs/05_test/phase3_ci_test_guide.md
          test -f saas-collab-system/docs/06_release/phase3_ci_release_gate.md
          for task in 001 002 003 004 005 006 007 008; do
            test -f "saas-collab-system/docs/00_stage0/review/p3_a_${task}_change_log.md"
          done
