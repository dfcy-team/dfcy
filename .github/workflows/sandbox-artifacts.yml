name: Sandbox immutable artifacts

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: sandbox-artifacts-${{ github.ref }}
  cancel-in-progress: false

env:
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DJANGO_SECRET_KEY: sandbox-artifact-ci-placeholder-secret
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
  DB_ENGINE: django.db.backends.sqlite3
  DB_NAME: /tmp/sandbox-artifact-ci.sqlite3
  REDIS_URL: redis://localhost:6379/15
  CELERY_BROKER_URL: redis://localhost:6379/15
  CELERY_RESULT_BACKEND: redis://localhost:6379/15

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Repository safety guard
        run: |
          python saas-collab-system/backend/scripts/ci_guard.py --root .
          sh saas-collab-system/deploy/sandbox/tests/test-install-guards.sh
          sh saas-collab-system/deploy/sandbox/tests/test-promotion-guards.sh
          sh saas-collab-system/deploy/sandbox/tests/test-sandbox-contracts.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: saas-collab-system/backend/requirements.txt

      - name: Backend system, migration, data quality, and test gates
        working-directory: saas-collab-system/backend
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python manage.py check
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
          python manage.py sync_permissions --check
          python manage.py check_phase3_data_quality
          python -m pytest -q

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend
        id: backend
        uses: docker/build-push-action@v6
        with:
          context: saas-collab-system/backend
          push: true
          tags: ghcr.io/${{ github.repository }}/saas-collab-backend:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true

      - name: Build and publish frontend
        id: frontend
        uses: docker/build-push-action@v6
        with:
          context: saas-collab-system
          file: saas-collab-system/deploy/sandbox/application/Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/saas-collab-frontend:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=
            VITE_USE_MOCK=false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true

      - name: Create immutable Sandbox manifest
        env:
          BACKEND_DIGEST: ${{ steps.backend.outputs.digest }}
          FRONTEND_DIGEST: ${{ steps.frontend.outputs.digest }}
        run: |
          migration_hash=$(python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          root = Path("saas-collab-system/backend")
          digest = sha256()
          for path in sorted(root.glob("apps/*/migrations/*.py")):
              digest.update(str(path.relative_to(root)).encode())
              digest.update(path.read_bytes())
          print(digest.hexdigest())
          PY
          )
          printf '{\n' > sandbox-artifact-manifest.json
          printf '  "schema_version": 1,\n' >> sandbox-artifact-manifest.json
          printf '  "environment": "sandbox",\n' >> sandbox-artifact-manifest.json
          printf '  "git_sha": "%s",\n' "${GITHUB_SHA}" >> sandbox-artifact-manifest.json
          printf '  "backend_image": "ghcr.io/%s/saas-collab-backend@%s",\n' "${GITHUB_REPOSITORY}" "${BACKEND_DIGEST}" >> sandbox-artifact-manifest.json
          printf '  "frontend_image": "ghcr.io/%s/saas-collab-frontend@%s",\n' "${GITHUB_REPOSITORY}" "${FRONTEND_DIGEST}" >> sandbox-artifact-manifest.json
          printf '  "migration_sha256": "%s"\n' "${migration_hash}" >> sandbox-artifact-manifest.json
          printf '}\n' >> sandbox-artifact-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-artifact-manifest-${{ github.sha }}
          path: sandbox-artifact-manifest.json
          if-no-files-found: error
          retention-days: 90
