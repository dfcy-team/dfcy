name: Phase 2 CI Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase2-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DJANGO_SECRET_KEY: phase2-ci-placeholder-secret
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
  DB_ENGINE: django.db.backends.sqlite3
  REDIS_URL: redis://localhost:6379/15
  CELERY_BROKER_URL: redis://localhost:6379/15
  CELERY_RESULT_BACKEND: redis://localhost:6379/15

jobs:
  repository-guard:
    name: Repository safety and file guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan tracked files without printing suspected values
        run: python saas-collab-system/backend/scripts/ci_guard.py --root .

  backend:
    name: Django and pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-collab-system/backend
    env:
      DB_NAME: /tmp/phase2-ci.sqlite3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: saas-collab-system/backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Django system check
        run: python manage.py check
      - name: Migration consistency
        run: python manage.py makemigrations --check --dry-run
      - name: Apply migrations to temporary SQLite database
        run: python manage.py migrate --noinput
      - name: Phase 1 and Phase 2 pytest suite
        run: python -m pytest -q

  frontend-build:
    name: Frontend build observation gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-collab-system/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: saas-collab-system/frontend/package-lock.json
      - name: Install locked frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  docker-config:
    name: Docker Compose configuration
    runs-on: ubuntu-latest
    env:
      DB_NAME: phase2_ci_demo
      DB_USER: phase2_ci_demo
      DB_PASSWORD: phase2-ci-placeholder-password
      MYSQL_ROOT_PASSWORD: phase2-ci-placeholder-root-password
      DB_HOST: mysql
      DB_PORT: "3306"
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose without loading a project .env
        run: docker compose --env-file /dev/null -f saas-collab-system/docker-compose.yml config --quiet

  rpa-and-docs:
    name: RPA samples and required documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate RPA JSON samples without running RPA
        shell: bash
        run: |
          find saas-collab-system/rpa-agent/tasks/examples -name '*.json' -print0 |
            xargs -0 -r -n 1 python -m json.tool >/dev/null
      - name: Reject RPA runtime output
        shell: bash
        run: |
          test -z "$(find saas-collab-system/rpa-agent/logs saas-collab-system/rpa-agent/screenshots -type f ! -name '.gitkeep' -print -quit)"
      - name: Check Phase 2 documents and change logs
        shell: bash
        run: |
          test -f saas-collab-system/docs/01_architecture/phase2_scope.md
          test -f saas-collab-system/docs/05_test/phase2_acceptance_checklist.md
          test -f saas-collab-system/docs/05_test/phase2_ci_test_guide.md
          test -f saas-collab-system/docs/06_release/phase2_ci_release_gate.md
          for task in 001 002 003 004 005 006 007; do
            test -f "saas-collab-system/docs/00_stage0/review/p2_a_${task}_change_log.md"
          done
