name: Local Sandbox Contract Gates

on:
  pull_request:
    paths:
      - ".github/workflows/local-sandbox-contract.yml"
      - "saas-collab-system/backend/apps/common/management/commands/seed_local_sandbox.py"
      - "saas-collab-system/backend/tests/test_local_sandbox_seed.py"
      - "saas-collab-system/deploy/dev-sandbox/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/local-sandbox-contract.yml"
      - "saas-collab-system/backend/apps/common/management/commands/seed_local_sandbox.py"
      - "saas-collab-system/backend/tests/test_local_sandbox_seed.py"
      - "saas-collab-system/deploy/dev-sandbox/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-sandbox-contract-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DJANGO_SECRET_KEY: local-sandbox-ci-placeholder-secret
  DJANGO_DEBUG: "true"
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
  DB_ENGINE: django.db.backends.sqlite3
  DB_NAME: /tmp/local-sandbox-contract.sqlite3
  REDIS_URL: redis://localhost:6379/15
  CELERY_BROKER_URL: redis://localhost:6379/15
  CELERY_RESULT_BACKEND: redis://localhost:6379/15

jobs:
  contract:
    name: Profiles, fixtures, seed guards, RC, and one-click scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: saas-collab-system/backend/requirements.txt

      - name: Install backend test dependencies
        working-directory: saas-collab-system/backend
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reject caller-controlled seed guard bypasses
        working-directory: saas-collab-system/backend
        run: python -m pytest -q tests/test_local_sandbox_seed.py

      - name: Validate Shell and PowerShell entrypoint syntax
        shell: bash
        run: |
          sh -n saas-collab-system/deploy/dev-sandbox/sandbox.sh
          pwsh -NoProfile -Command '$tokens = $null; $parseErrors = $null; [System.Management.Automation.Language.Parser]::ParseFile("saas-collab-system/deploy/dev-sandbox/sandbox.ps1", [ref]$tokens, [ref]$parseErrors) > $null; if ($parseErrors.Count) { $parseErrors | ForEach-Object { Write-Error $_ }; exit 1 }'

      - name: Execute Shell one-click Local Sandbox contract
        working-directory: saas-collab-system/deploy/dev-sandbox
        shell: bash
        run: sh ./sandbox.sh contract integration

      - name: Execute PowerShell one-click Local Sandbox contract
        working-directory: saas-collab-system/deploy/dev-sandbox
        shell: pwsh
        run: ./sandbox.ps1 -Action contract -SandboxProfile integration

      - name: Confirm immutable RC and mock-only safety markers
        shell: bash
        run: |
          ! grep -Eq '^[[:space:]]*build[[:space:]]*:' saas-collab-system/deploy/dev-sandbox/docker-compose.rc.yml
          grep -Fx 'SANDBOX_ALLOW_REAL_PLATFORM=false' saas-collab-system/deploy/dev-sandbox/env.local.example
          grep -Fx 'SANDBOX_ALLOW_HIGH_RISK_AUTOMATION=false' saas-collab-system/deploy/dev-sandbox/env.local.example
          grep -Fx 'INTEGRATION_ENCRYPTION_PROVIDER=test-only' saas-collab-system/deploy/dev-sandbox/env.local.example
