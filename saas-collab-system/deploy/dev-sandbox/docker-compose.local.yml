name: saas-collab-local

x-local-profiles: &local-profiles
  - core
  - sales-inventory-finance-reconciliation
  - creator-management
  - procurement
  - integration

x-backend-environment: &backend-environment
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_DEBUG: "true"
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
  CORS_ALLOWED_ORIGINS: http://localhost:${LOCAL_SANDBOX_FRONTEND_PORT:-5173},http://127.0.0.1:${LOCAL_SANDBOX_FRONTEND_PORT:-5173}
  DB_ENGINE: django.db.backends.mysql
  DB_NAME: ${DB_NAME}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_HOST: mysql
  DB_PORT: "3306"
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  INTEGRATION_ENCRYPTION_PROVIDER: test-only
  LOCAL_SANDBOX_ENVIRONMENT: local-sandbox
  LOCAL_SANDBOX_DEMO_PASSWORD: ${LOCAL_SANDBOX_DEMO_PASSWORD}
  SANDBOX_ALLOW_REAL_PLATFORM: "false"
  SANDBOX_ALLOW_HIGH_RISK_AUTOMATION: "false"

services:
  mysql:
    image: mysql:8.4
    profiles: *local-profiles
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${LOCAL_SANDBOX_MYSQL_PORT:-3307}:3306"
    volumes:
      - local-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    profiles: *local-profiles
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - local-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../..
      dockerfile: deploy/dev-sandbox/Dockerfile.backend.dev
    profiles: *local-profiles
    entrypoint: []
    command: ["sh", "-c", "python manage.py check && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"]
    environment: *backend-environment
    volumes:
      - ../../backend:/app
    ports:
      - "127.0.0.1:${LOCAL_SANDBOX_BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; request=urllib.request.Request('http://127.0.0.1:8000/api/internal/health/', headers={'Host':'localhost'}); raise SystemExit(0 if urllib.request.urlopen(request, timeout=3).status == 200 else 1)"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  celery:
    build:
      context: ../..
      dockerfile: deploy/dev-sandbox/Dockerfile.backend.dev
    profiles: *local-profiles
    entrypoint: []
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]
    environment: *backend-environment
    volumes:
      - ../../backend:/app
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ../..
      dockerfile: deploy/dev-sandbox/Dockerfile.backend.dev
    profiles: *local-profiles
    entrypoint: []
    command: ["celery", "-A", "config", "beat", "--loglevel=info", "--schedule", "/tmp/celerybeat-schedule"]
    environment: *backend-environment
    volumes:
      - ../../backend:/app
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: deploy/dev-sandbox/Dockerfile.frontend.dev
    profiles: *local-profiles
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      VITE_API_BASE_URL: http://localhost:${LOCAL_SANDBOX_BACKEND_PORT:-8000}
      VITE_USE_MOCK: "false"
      VITE_CREATOR_MOCK_BASE_URL: http://localhost:${LOCAL_SANDBOX_CREATOR_MOCK_PORT:-8091}
    volumes:
      - ../../frontend:/app
      - local-frontend-node-modules:/app/node_modules
    ports:
      - "127.0.0.1:${LOCAL_SANDBOX_FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy

  creator-mock:
    image: python:3.12-alpine
    profiles:
      - creator-management
      - integration
    command: ["python", "/sandbox/mock_server.py", "--port", "8091"]
    working_dir: /sandbox
    volumes:
      - ./:/sandbox:ro
    ports:
      - "127.0.0.1:${LOCAL_SANDBOX_CREATOR_MOCK_PORT:-8091}:8091"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; raise SystemExit(0 if urllib.request.urlopen('http://127.0.0.1:8091/health/', timeout=3).status == 200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 20

  seed:
    build:
      context: ../..
      dockerfile: deploy/dev-sandbox/Dockerfile.backend.dev
    profiles:
      - tooling
    entrypoint: []
    command:
      - python
      - manage.py
      - seed_local_sandbox
      - --confirm-local
      - --module
      - ${LOCAL_SANDBOX_MODULE:-core}
    environment: *backend-environment
    volumes:
      - ../../backend:/app
    depends_on:
      backend:
        condition: service_healthy

  fixture-check:
    image: python:3.12-alpine
    profiles:
      - tooling
    command: ["python", "/sandbox/validate_fixtures.py", "--module", "${LOCAL_SANDBOX_MODULE:-core}"]
    working_dir: /sandbox
    volumes:
      - ./:/sandbox:ro

  test-db-prepare:
    image: mysql:8.4
    profiles:
      - tooling
    environment:
      MYSQL_PWD: ${MYSQL_ROOT_PASSWORD}
      TEST_DB_NAME: test_${DB_NAME}
      TEST_DB_USER: ${DB_USER}
    entrypoint: ["sh", "-ec"]
    command:
      - |
        case "$${TEST_DB_NAME}" in test_saas_collab_local_*) ;; *) echo "Unsafe Local Sandbox test database name" >&2; exit 2 ;; esac
        case "$${TEST_DB_USER}" in *[!A-Za-z0-9_]*) echo "Unsafe Local Sandbox database user" >&2; exit 2 ;; esac
        mysql -h mysql -u root -e "CREATE DATABASE IF NOT EXISTS \`$${TEST_DB_NAME}\`; GRANT ALL PRIVILEGES ON \`$${TEST_DB_NAME}\`.* TO '$${TEST_DB_USER}'@'%';"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  local-mysql-data:
  local-redis-data:
  local-frontend-node-modules:
