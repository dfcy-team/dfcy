services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - ${PILOT_ENV_FILE:-.env.pilot}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    volumes:
      - saas-pilot-mysql-data:/var/lib/mysql
    networks:
      - pilot-internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    env_file:
      - ${PILOT_ENV_FILE:-.env.pilot}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - saas-pilot-redis-data:/data
    networks:
      - pilot-internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  saas-pilot-mysql-data:
  saas-pilot-redis-data:

networks:
  pilot-internal:
    name: saas-pilot-network
    driver: bridge
