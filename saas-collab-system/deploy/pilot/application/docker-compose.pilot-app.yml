services:
  redis:
    image: ${PILOT_REDIS_IMAGE:?Set an immutable Redis image reference in .env.pilot}
    env_file:
      - ${PILOT_ENV_FILE:-.env.pilot}
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - redis-data:/data
    networks:
      - pilot-internal

  migrate:
    image: ${PILOT_BACKEND_IMAGE:?Use the backend digest recorded by the Sandbox PASS evidence}
    env_file:
      - ${PILOT_ENV_FILE:-.env.pilot}
    command: python manage.py migrate --noinput
    restart: "no"
    networks:
      - pilot-internal
    depends_on:
      redis:
        condition: service_healthy

  backend:
    image: ${PILOT_BACKEND_IMAGE:?Use the backend digest recorded by the Sandbox PASS evidence}
    env_file:
      - ${PILOT_ENV_FILE:-.env.pilot}
    command: >-
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-2} --timeout ${GUNICORN_TIMEOUT:-60}
      --access-logfile - --error-logfile -
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PILOT_APP_PORT:-8000}:8000"
    networks:
      - pilot-internal
    depends_on:
      redis:
        condition: service_healthy

  celery:
    image: ${PILOT_BACKEND_IMAGE:?Use the backend digest recorded by the Sandbox PASS evidence}
    env_file:
      - ${PILOT_ENV_FILE:-.env.pilot}
    command: celery -A config worker --loglevel=info
    restart: unless-stopped
    networks:
      - pilot-internal
    depends_on:
      redis:
        condition: service_healthy

  celery-beat:
    image: ${PILOT_BACKEND_IMAGE:?Use the backend digest recorded by the Sandbox PASS evidence}
    env_file:
      - ${PILOT_ENV_FILE:-.env.pilot}
    command: celery -A config beat --loglevel=info
    restart: unless-stopped
    networks:
      - pilot-internal
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: ${PILOT_FRONTEND_IMAGE:?Use the frontend digest recorded by the Sandbox PASS evidence}
    restart: unless-stopped
    environment:
      NGINX_ENVSUBST_FILTER: PILOT_HTTPS_PORT
      PILOT_HTTPS_PORT: ${PILOT_HTTPS_PORT:-8443}
    ports:
      - "${PILOT_HTTP_PORT:-8080}:80"
      - "${PILOT_HTTPS_PORT:-8443}:443"
    volumes:
      - ${PILOT_TLS_CERT_PATH:?Set PILOT_TLS_CERT_PATH in .env.pilot}:/etc/nginx/tls/tls.crt:ro
      - ${PILOT_TLS_KEY_PATH:?Set PILOT_TLS_KEY_PATH in .env.pilot}:/etc/nginx/tls/tls.key:ro
    depends_on:
      - backend
    networks:
      - pilot-internal

networks:
  pilot-internal:
    name: saas-pilot-network

volumes:
  redis-data:
